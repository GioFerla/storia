services:
  memoria-cernusco:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memoria-cernusco
    ports:
      - "8090:8090"
    restart: unless-stopped
    depends_on:
      - content-api
    volumes:
      # Opzionale: monta il file HTML per sviluppo live (rimuovere in produzione)
      - ./memoria-cernusco.html:/usr/share/nginx/html/index.html:ro

  content-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: memoria-cernusco-api:local
    container_name: memoria-cernusco-api
    restart: unless-stopped
    volumes:
      - content_api_data:/app/data

volumes:
  content_api_data:
